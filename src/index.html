<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 3 - Landing Page</title>
    <link href="./output.css" rel="stylesheet" />
    <script src="./script.js" defer></script>
  </head>
  <body
    class="dark:text-white dark:bg-black relative flex flex-col font-quicksand"
  >
    <!-- ========== 1. HEADER SECTION ========== -->
    <header
      id="header"
      class="container w-full flex justify-between sticky h-16 top-0 p-4 backdrop-blur-xl z-15 md:px-7.5 lg:px-20 xl:px-35 m-auto"
    >
      <!-- 1.1 Logo -->
      <div class="logo flex items-center gap-3 cursor-pointer">
        <img src="./assets/img/light/logo-symbol.svg" alt="Logo" />
        <h1 class="font-outfit font-semibold text-2xl">Your Logo</h1>
      </div>

      <!-- 1.2 Nav menu (Desktop) -->
      <nav class="gap-4 hidden lg:flex items-center">
        <!-- 1.2.1 Nav link menu -->
        <ul
          class="flex justify-center items-center lg:gap-8 font-semibold text-4 w-full dark:text-[#FDFDFD] text-black"
        >
          <li>
            <a href="#smart-IT-solution" class="hover:text-[#FF623E]">About</a>
          </li>
          <li>
            <a href="#build-for-your-industry" class="hover:text-[#FF623E]"
              >Service</a
            >
          </li>
          <li>
            <a href="#from-vision-to-launch" class="hover:text-[#FF623E]"
              >Projects</a
            >
          </li>
          <li>
            <a href="#what-partners-say" class="hover:text-[#FF623E]"
              >Testimonials</a
            >
          </li>
          <li><a href="#need-help" class="hover:text-[#FF623E]">FAQ</a></li>
        </ul>
      </nav>

      <!-- 1.3 dark mode button, hamburger button (mobile) and lets talk button (desktop)-->
      <div class="buttons flex items-center gap-2 lg:w-[15%]">
        <!-- 1.3.1 dark mode button -->
        <button
          class="dark-button flex justify-center items-center p-0.5 rounded-lg border-2 cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
            class="size-4.5"
          >
            <path
              fill-rule="evenodd"
              d="M7.455 2.004a.75.75 0 0 1 .26.77 7 7 0 0 0 9.958 7.967.75.75 0 0 1 1.067.853A8.5 8.5 0 1 1 6.647 1.921a.75.75 0 0 1 .808.083Z"
              clip-rule="evenodd"
            />
          </svg>
        </button>

        <!-- 1.3.2 hamburger button (mobile) -->
        <button
          class="hamburger-button relative lg:hidden z-20 flex flex-col items-center justify-center gap-1.5 cursor-pointer"
        >
          <span class="ham-btn-span"></span>
          <span class="ham-btn-span"></span>
          <span class="ham-btn-span"></span>
        </button>

        <!--  1.3.3. let's talk button (desktop) -->
        <a href="#ready-to-start" class="w-full">
          <div class="button-container hidden lg:flex w-full">
            <button class="btn">Let's Talk</button>
          </div>
        </a>
      </div>
    </header>

    <!-- 1.4 offset menu (mobile) -->
    <nav
      class="offset-menu container fixed top-16 left-0 md:m-auto px-4 md:px-7.5 mobile-menu w-full bg-white z-10 dark:bg-black h-screen flex flex-col gap-4 lg:hidden"
    >
      <!-- 1.4.1 Nav menu -->
      <ul
        class="flex flex-col justify-center gap-4 font-semibold text-4 w-full dark:text-[#FDFDFD] text-black"
      >
        <li><a href="#smart-IT-solution">About</a></li>
        <li><a href="#build-for-your-industry">Service</a></li>
        <li><a href="#from-vision-to-launch">Projects</a></li>
        <li><a href="#what-partners-say">Testimonials</a></li>
        <li><a href="#need-help">FAQ</a></li>
      </ul>

      <!-- 1.4.2 Let's talk button -->
      <a href="#ready-to-start" class="w-full">
        <div class="button-container w-full dark:bg-black">
          <button class="offset-button btn">Let's Talk</button>
        </div></a
      >
    </nav>

    <!-- ========== 2. HERO SECTION ========== -->
    <section
      id="hero"
      class="container flex flex-col lg:flex lg:flex-row lg:relative items-center pt-5 lg:py-15 xl:py-45 lg:px-20 xl:px-35 m-auto w-full"
    >
      <!-- 2.1 text -->
      <div
        class="flex flex-col gap-5 w-full px-4 md:px-7.5 lg:px-0 lg:w-[50%] xl:w-[55%]"
      >
        <h1 class="font-bold text-4xl xl:text-5xl lg:leading-14 xl:leading-16">
          Your Tech Partner for
          <span class="text-[#FF6C37]">Smarter Growth</span>
        </h1>
        <p class="text-base font-semibold xl:text-lg">
          We deliver tailored IT solutions to help you scale with speed and
          confidence.
        </p>

        <!-- 2.2 Hero button -->
        <a href="#ready-to-start" class="w-full">
          <button class="btn lg:text-base mt-5 mb-10 lg:max-w-50">
            Let's Talk
          </button></a
        >
      </div>

      <!-- 2.3 Hero Image -->
      <div
        class="lg:absolute lg:-z-1 lg:right-0 lg:-top-10 xl:-top-20 lg:bottom-0 w-full lg:w-[43%] xl:w-[55%] 2xl:w-[43%]"
      >
        <div class="relative h-full w-full">
          <!-- Logo untuk Light Mode -->
          <img
            src="./assets/img/light/hero-image-light.webp"
            alt="lighting"
            class="block w-full h-full dark:hidden"
          />
          <!-- Logo untuk dark Mode -->
          <img
            src="./assets/img/dark/hero-image-dark.webp"
            alt="darking"
            class="w-full hidden dark:block"
          />
          <!-- gradient -->
          <div
            class="absolute top-0 w-full h-25 lg:hidden bg-linear-to-b dark:from-black from-white to-transparent z-5"
          ></div>
        </div>
      </div>
    </section>

    <!-- ========== 3. TRUSTED BY GLOBAL INNOVATORS SECTION (MARQUEE) ========== -->
    <section
      id="trusted-by-global-innovators"
      class="container flex flex-col lg:items-center gap-2 md:gap-4 lg:gap-8 xl:gap-20 sm:mx-auto"

      <!-- 3.1 text -->
      <h2 class="font-bold text-center p-4 xl:text-3xl 2xl:text-4xl">
        Trusted by Global Innovators & Leading Brands
      </h2>

      <!-- 3.2 marquee -->
      <div
        class="logo-slider relative pseudo-before pseudo-after overflow-hidden lg:w-[90%]"
      >
        <div
          class="logo-track flex justify-center items-center w-max h-full [&>div]:mr-5 [&>div]:shrink-0 cursor-grab select-none"
        >
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/adobe.svg"
              alt="adobe logo"
              class="marquee-logo-style"
            />

          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/airbnb.svg"

              class="marquee-logo-style"

          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/dropbox.svg"
              alt="dropbox logo"
              class="marquee-logo-style"

          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/netflix.svg"
              alt="netflix logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/paypal.svg"
              alt="paypal logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/postman.svg"
              alt="postman logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/upwork.svg"
              alt="upwork logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/zoom.svg"
              alt="zoom logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/adobe.svg"
              alt="adobe logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/airbnb.svg"
              alt="airbnb logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/databricks.svg"
              alt="databricks logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/dropbox.svg"
              alt="dropbox logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/netflix.svg"
              alt="netflix logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/paypal.svg"
              alt="paypal logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/postman.svg"
              alt="postman logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/upwork.svg"
              alt="upwork logo"
              class="marquee-logo-style"
            />
          </div>
          <div class="logo-item group">
            <img
              src="./assets/img/marquee-logo/zoom.svg"
              alt="zoom logo"
              class="marquee-logo-style"
            />
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
